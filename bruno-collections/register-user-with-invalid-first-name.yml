info:
  name: register-user-with-invalid-first-name
  type: http
  seq: 11

http:
  method: POST
  url: "{{baseUrl}}/register"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "username": "{{$randomUserName}}",
        "email": "{{$randomEmail}}",
        "password": "Strong@Password1",
        "firstName": "abcdefghijklabcdefghijklabcdefghijklabcdefghijklabcdefghijklabcdefghijklabcdefghijklabcdefghijkl",
        "lastName": "{{$randomLastName}}",
        "phoneNumber": "{{BDPhoneNumber}}",
        "dateOfBirth": "2005-06-11"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (body && body.id) {
          bru.setVar("lastCreatedUserId", body.id);
          bru.setVar("lastCreatedUser", body);

          // Known Issue: String starting with "+" is treated as Number
          bru.getVar("lastCreatedUser").phoneNumber = String(bru.getVar("lastCreatedUser").phoneNumber);
          console.log("Captured userId: ", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.error
      operator: eq
      value: "Validation failed: firstName: size must be between 2 and 50"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
