info:
  name: update-user
  type: http
  seq: 14

http:
  method: PUT
  url: "{{baseUrl}}/users/{{lastCreatedUserId}}"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "displayName": "Updated"
      }
  auth: inherit

runtime:
  scripts:
    - type: after-response
      code: |-
        const body = res.getBody();

        if (body && body.id) {
          bru.setVar("lastCreatedUserId", body.id);
          bru.setVar("lastCreatedUser", body);

          // Known Issue: String starting with "+" is treated as Number
          bru.getVar("lastCreatedUser").phoneNumber = String(bru.getVar("lastCreatedUser").phoneNumber);
          console.log("Captured userId: ", body.id);
        }
  assertions:
    - expression: res.status
      operator: eq
      value: "400"
    - expression: res.body.displayName
      operator: eq
      value: Updated

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
